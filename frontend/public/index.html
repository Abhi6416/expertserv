<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a56db" />

    <!-- ── SEO Meta Tags ─────────────────────────────────────────────────── -->
    <meta name="description"
      content="ExpertServ Solution — India's leading enterprise telecom company. IVR, RCS, SMS, and OTP services trusted by 500+ businesses. Get a free consultation today." />
    <meta name="keywords"
      content="IVR solutions India, bulk SMS service, RCS messaging, OTP service provider, telecom solutions, enterprise messaging, ExpertServ" />
    <meta name="author" content="ExpertServ Solution" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph (Facebook / LinkedIn) ──────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.expertservsolution.com/" />
    <meta property="og:title"       content="ExpertServ Solution — Enterprise Telecom IVR, RCS, SMS & OTP" />
    <meta property="og:description" content="Empowering 500+ businesses with scalable IVR, RCS, SMS and OTP solutions. TRAI compliant. 99.9% uptime SLA." />
    <meta property="og:image"       content="%PUBLIC_URL%/og-image.png" />

    <!-- ── Twitter Card ──────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="ExpertServ Solution — Enterprise Telecom" />
    <meta name="twitter:description" content="IVR, RCS, SMS & OTP solutions for enterprise. 500+ clients. 99.9% uptime." />

    <!-- ── Canonical ─────────────────────────────────────────────────────── -->
    <link rel="canonical" href="https://www.expertservsolution.com/" />

    <!-- ── Favicon ───────────────────────────────────────────────────────── -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Preconnect for Google Fonts ───────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── Structured Data (JSON-LD) ─────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ExpertServ Solution",
      "url": "https://www.expertservsolution.com",
      "logo": "https://www.expertservsolution.com/logo.png",
      "description": "Enterprise telecom solutions — IVR, RCS, SMS, OTP services for businesses across India.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "123, Tech Park, Sector 62",
        "addressLocality": "Noida",
        "addressRegion": "Uttar Pradesh",
        "postalCode": "201301",
        "addressCountry": "IN"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "info@expertservsolution.com",
        "contactType": "customer service"
      }
    }
    </script>

    <title>ExpertServ Solution — Enterprise IVR, RCS, SMS & OTP Services</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this application.</noscript>
    <div id="root"></div>
  </body>
</html>
